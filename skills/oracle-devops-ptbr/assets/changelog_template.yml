  - id: "DB-009"
    arquivo: "sequences/alter/001_seq_clientes_increment_10.sql"
    tipo: "ddl"
    descricao: "seq_clientes — alterar incremento para 10"

  - id: "DB-010"
    arquivo: "data/002_update_tipo_cliente_descricao.sql"
    tipo: "dml"
    descricao: "Corrigir descrição do tipo GOV para Governo"

