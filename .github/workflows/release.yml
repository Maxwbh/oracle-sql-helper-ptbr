# .github/workflows/release.yml
# GitHub Actions — Build e publicação automática de release
# M&S do Brasil LTDA — contato@msbrasil.inf.br
#
# Dispara em:
#   - push de tag v* (ex: git tag v3.1.0 && git push origin v3.1.0)
#   - workflow_dispatch (manual, para builds de teste)
#
# O que faz:
#   1. Roda build.py --check (validação)
#   2. Roda build.py (empacota todas as skills)
#   3. Cria GitHub Release com:
#      - Release notes extraídas do CHANGELOG.md
#      - Todos os .skill como assets para download direto
#      - checksums.sha256 para verificação de integridade
# ─────────────────────────────────────────────────────────────────────────────

name: Build e Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      pre_release:
        description: "Marcar como pre-release?"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write  # necessário para criar releases

jobs:

  # ─── Build ──────────────────────────────────────────────────────────────────

  build:
    name: Build Skills
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install pyyaml

      - name: Verificar consistência
        run: python build.py --check

      - name: Empacotar skills
        run: python build.py

      - name: Listar pacotes gerados
        run: |
          echo "=== dist/ ==="
          ls -lh dist/
          echo ""
          echo "=== checksums ==="
          cat dist/checksums.sha256

      - name: Fazer upload dos artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oracle-skills-dist
          path: dist/
          retention-days: 7

  # ─── Release ────────────────────────────────────────────────────────────────

  release:
    name: Publicar GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Baixar artifacts do build
        uses: actions/download-artifact@v4
        with:
          name: oracle-skills-dist
          path: dist/

      - name: Extrair versão da tag
        id: versao
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extrair release notes do CHANGELOG.md
        id: notes
        run: |
          python3 - << 'PYEOF'
          import re, os

          with open("CHANGELOG.md") as f:
              content = f.read()

          # Extrai a seção da versão mais recente
          version = os.environ.get("GITHUB_REF_NAME", "").lstrip("v")
          pattern = rf"## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## \[|\Z)"
          match = re.search(pattern, content, re.DOTALL)

          notes = match.group(1).strip() if match else \
                  f"Release {version} — veja CHANGELOG.md para detalhes."

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"notes<<EOF_NOTES\n{notes}\nEOF_NOTES\n")
          PYEOF

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "oracle-skills-ptbr ${{ github.ref_name }}"
          body: |
            ## oracle-skills-ptbr ${{ github.ref_name }}

            **7 Skills Claude para Oracle em Português**

            ${{ steps.notes.outputs.notes }}

            ---

            ### Instalação

            1. Baixe os arquivos `.skill` abaixo
            2. No Claude.ai → **Settings → Skills → Upload**
            3. Repita para cada skill desejada

            ### Skills nesta release

            | Skill | Descrição |
            |---|---|
            | `oracle-plsql-ptbr.skill` | PL/SQL 19c, packages, LOBs, EBR |
            | `oracle-apex-ptbr.skill` | APEX 24.2 development + Data Dictionary |
            | `oracle-ords-ptbr.skill` | ORDS REST services + Data Dictionary |
            | `oracle-dba-ptbr.skill` | DBA operacional + Data Dictionary Oracle |
            | `oracle-tuning-ptbr.skill` | Performance, AWR, ASH, explain plan |
            | `oracle-trivadis-ptbr.skill` | Trivadis Guidelines 4.4 |
            | `oracle-devops-ptbr.skill` | Git, CI/CD, changelog Oracle, Python oracledb |

            ### Verificar integridade

            ```bash
            sha256sum --check checksums.sha256
            ```

            ---
            Desenvolvido por **Maxwell da Silva Oliveira** — [M&S do Brasil LTDA](https://msbrasil.inf.br)
          files: |
            dist/*.skill
            dist/checksums.sha256
          prerelease: ${{ inputs.pre_release == 'true' }}
          generate_release_notes: false
          fail_on_unmatched_files: true
