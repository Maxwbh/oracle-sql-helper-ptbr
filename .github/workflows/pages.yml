# .github/workflows/pages.yml
# Publica docs/ no branch gh-pages a cada push na main
# M&S do Brasil LTDA — contato@msbrasil.inf.br
#
# Usa peaceiris/actions-gh-pages — mais estável e sem dependência
# de actions/configure-pages que pode falhar com erros de SHA.
#
# Configuração única no GitHub (só precisa fazer uma vez):
#   Repo → Settings → Pages → Source: Deploy from a branch
#   Branch: gh-pages  /  Folder: / (root)
# ─────────────────────────────────────────────────────────────────────────────

name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Publicar GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy para gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          commit_message: "docs: atualiza landing page [${{ github.sha }}]"
          force_orphan: true          # branch gh-pages sempre limpo
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
